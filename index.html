<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPaperScissors</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="RockPaperScissors.js" defer></script>

</head>

<body>

        <header>ROCK PAPER SCISSORS</header>

    <main>
        
        <h1>ESCOLHA SUA JOGADA</h1>

        <div id="botoes">

            <button id="pedra">Pedra 🪨</button>
            <button id="papel">Papel 📝</button>
            <button id="tesoura">Tesoura ✂️</button>

        </div>

        <div id="area-resultado">

            <div id="informacoes">
                <span id="jogadaUsuario">Jogada do usuário:</span>
                <span id="jogadaMaquina">Jogada do computador:</span>
                <span id="resultado">Resultado:</span>
            </div>

            <div id="placar">
                <span id="vitorias">Vitórias: 0</span>
                <span id="derrotas">Derrotas: 0</span>
                <span id="empates">Empates: 0</span>
            </div>

        </div>
       
    </main>

</body>
</html>
